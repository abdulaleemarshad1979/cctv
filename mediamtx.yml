# MediaMTX Low-Latency Configuration (Auto-generated)
rtsp: yes
rtspAddress: :8554
protocols: [udp, multicast, tcp]
rtpAddress: :8002
rtcpAddress: :8003

rtmp: yes
rtmpAddress: :1935

srt: yes
srtAddress: :8890

webrtc: yes
webrtcAddress: :8889

hls: yes
hlsAddress: :8088

readTimeout: 5s
writeTimeout: 5s

externalAuthenticationURL: http://127.0.0.1:8000/auth

paths:
  all:
    runOnReady: 'curl -X POST http://127.0.0.1:8000/cameras/state -H "Content-Type: application/json" -d "{\"path\":\"$MTX_PATH\", \"status\":\"online\"}"'
    runOnNotReady: 'curl -X POST http://127.0.0.1:8000/cameras/state -H "Content-Type: application/json" -d "{\"path\":\"$MTX_PATH\", \"status\":\"offline\"}"'