# MediaMTX Low-Latency Configuration
# Auto-loaded by mediamtx when run from this directory

# RTSP server
rtsp: yes
rtspAddress: :8554
rtspTransports: [udp, tcp]

# RTMP server
rtmp: yes
rtmpAddress: :1935

# SRT server (UDP-based streaming)
srt: yes
srtAddress: :8890

# WebRTC server (Ultra-low latency web player)
webrtc: yes
webrtcAddress: :8889

# Low-latency buffer tuning
# Reducing buffer sizes helps prevent the build-up of old/stale frames.
readBufferCount: 256   # default: 1024
writeBufferCount: 256  # default: 1024

# Uncomment below for ultra-low-latency testing:
# readBufferCount: 64
# writeBufferCount: 64

# Timeouts
readTimeout: 5s
writeTimeout: 5s
runOnPublish: ""
runOnPublishRestart: no

paths:
  live/drone1:
    readTimeout: 5s
    sourceOnDemand: no
  live/drone2:
    readTimeout: 5s
    sourceOnDemand: no
  live/drone3:
    readTimeout: 5s
    sourceOnDemand: no
  live/drone4:
    readTimeout: 5s
    sourceOnDemand: no
